<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Lambda Monitor Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f5f5f5;
        }

        h1 {
            color: #232f3e;
        }

        p {
            color: #666;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        th {
            background: #232f3e;
            color: white;
            padding: 12px 16px;
            text-align: left;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid #eee;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: #f9f9f9;
        }

        .errors {
            color: #e74c3c;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1>🔍 Lambda Monitor Dashboard</h1>
    <p>Generated: $generated_at</p>
    <p>Range: last $days days</p>
    <table>
        <thead>
            <tr>
                <th>Function Name</th>
                <th>Runtime</th>
                <th>Invocations</th>
                <th>Errors</th>
                <th>Avg Duration (ms)</th>
                <th>Throttles</th>
            </tr>
        </thead>
        <tbody>
            $rows
        </tbody>
    </table>
</body>

</html>
